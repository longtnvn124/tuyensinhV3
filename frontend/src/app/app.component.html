<router-outlet></router-outlet>
@if (isSpinnerVisible()) {
    <div>
        <mat-progress-bar class="loader" mode="indeterminate" value="40"></mat-progress-bar>
    </div>
}
<p-toast [life]="10000" [preventOpenDuplicates]="true" position="bottom-left"></p-toast>
<span class="app-version"><i [class.connected]="isInternetConnected()" class="app-version__connect-status"></i> V{{ appVersion }}</span>

@if (displayLostConnectionNotice()) {
    <div class="ictu-connection-checker" animate.leave="ictu-connection-checker--leave">
        <div class="ictu-connection-checker__icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M6.92,5.51h0L3.71,2.29A1,1,0,0,0,2.29,3.71L4.56,6A15.21,15.21,0,0,0,1.4,8.39a1,1,0,0,0,0,1.41,1,1,0,0,0,.71.3,1,1,0,0,0,.7-.29A13.07,13.07,0,0,1,6.05,7.46L7.54,9a10.78,10.78,0,0,0-3.32,2.27,1,1,0,1,0,1.42,1.4,8.8,8.8,0,0,1,3.45-2.12l1.62,1.61a7.07,7.07,0,0,0-3.66,1.94,1,1,0,1,0,1.42,1.4A5,5,0,0,1,12,14a4.13,4.13,0,0,1,.63.05l7.66,7.66a1,1,0,0,0,1.42,0,1,1,0,0,0,0-1.42ZM12,16a3,3,0,1,0,3,3A3,3,0,0,0,12,16Zm0,4a1,1,0,1,1,1-1A1,1,0,0,1,12,20ZM22.61,8.39A15,15,0,0,0,10.29,4.1a1,1,0,1,0,.22,2A13.07,13.07,0,0,1,21.2,9.81a1,1,0,0,0,1.41-1.42Zm-4.25,4.24a1,1,0,0,0,1.42-1.4,10.75,10.75,0,0,0-4.84-2.82,1,1,0,1,0-.52,1.92A8.94,8.94,0,0,1,18.36,12.63Z" fill="currentColor"></path>
            </svg>
        </div>
        <div class="ictu-connection-checker__details">
            <h2 class="ictu-connection-checker__title">Mất kết nối mạng</h2>
            <p class="ictu-connection-checker__desc">Kết nối mạng internet của bạn không khả dụng</p>
            <button (click)="closeLostConnectionNotice()" class="ictu-connection-checker__btn-reconnect">Đóng cảnh báo</button>
        </div>
        <button (click)="closeLostConnectionNotice()" class="ictu-connection-checker__close--times p-button-text p-button-rounded p-button-secondary" pButton pRipple type="button">
            <i class="pi pi-times" pButtonIcon></i>
        </button>
    </div>
}
