@if (sources().length) {
    @if (media().provider === 'googleDrive') {
        <iframe [src]="sources()[0].src | safeResourceUrl" allow="fullscreen; autoplay" frameborder="0" width="100%" height="100%" title="Google Drive video player"></iframe>
    } @else {
        <div class="d-flex justify-content-center align-items-center h-100 w-100 position-relative overflow-hidden">
            <div class="d-inline-flex p-15 w-100" style="height: auto;">
                <plyr class="w-100 ictu-plyr-default" [plyrSources]="sources()" plyrType="audio"></plyr>
            </div>
            @if (fileDetails()) {
                <p class="class-curriculum-lecture-media-picture__info m-0 position-absolute">{{ fileDetails() }}</p>
            }
        </div>
    }
} @else {
    <div class="d-flex justify-content-center align-items-center w-100 h-100">
