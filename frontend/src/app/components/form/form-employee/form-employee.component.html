<div class="d-block position-relative">
	@if (isLoading()) {
		<div class="d-flex position-absolute top-0 start-0 w-100 h-100 justify-content-center align-items-center flex-column" style="background-color: rgb(255 255 255 / 71%);z-index: 50;border-radius: inherit;backdrop-filter: blur(10px);gap: 5px;color: #333333;">
			<div class="d-block ictu-image-loading-bg wid-25 aspect-ratio-1"></div>
			<p class="f-14 fw-normal f-roboto" style="margin: 10px 0 0;line-height: 1">{{ loadingTitle() }}</p>
		</div>
	}
	@if (state() === 'error') {
		<div class="d-flex justify-content-center align-items-center">
			<div class="admin-table__alert-danger text-center w-100">Tải dữ liệu thất bại. Vui lòng chọn
				<a (click)="reload($event)" href="javascript:" class="admin-table__alert-danger__btn-reload">tải lại</a>
			</div>
		</div>
	} @else {
		<form [formGroup]="formGroup" class="ictu-form p-0">
			<div class="ictu-form__row">
				<div class="d-flex justify-content-center align-items-center">
					<div class="profile-photo-maker">
						<div class="profile-photo-maker__photo ictu-media-wrapper">
							<img class="profile-photo-maker__photo__img" [src]="getControl( 'photo' ).value ?? profilePhotoPlaceholder()" alt="">
							<button (click)="btnUpdateEmployeePhoto()" class="btn profile-photo-maker__btn-upload">
								<i class="ti ti-camera-plus"></i>
							</button>
						</div>
						<h4 class="profile-photo-maker__heading">Ảnh hồ sơ</h4>
						<p class="profile-photo-maker__desc">(Size 200x200)</p>
					</div>
				</div>
			</div>
			<div class="ictu-form__row">
				<div class="row">
					<div class="col-8">
						<div class="ictu-form__row">
							<label class="ictu-form__label" for="f_name" [class.ictu-form__label--required]="getControl('full_name').hasValidator(Validators.required)">Họ và tên</label>
							<input class="ictu-form__input-field" formControlName="full_name" id="f_name" pInputText placeholder="Họ và tên" type="text">
						</div>
					</div>
					<div class="col-4">
						<div class="ictu-form__row">
							<label class="ictu-form__label" for="em_code" [class.ictu-form__label--required]="getControl('code').hasValidator(Validators.required)">Mã nhân viên</label>
							<input class="ictu-form__input-field" formControlName="code" id="em_code" pInputText placeholder="Mã nhân viên" type="text">
						</div>
					</div>
				</div>
			</div>
			<div class="ictu-form__row">
				<div class="row">
					<div class="col-4">
						<div class="ictu-form__row">
							<label class="ictu-form__label" [class.ictu-form__label--required]="getControl('gender').hasValidator(Validators.required)">Giới tính</label>
							<p-select [options]="GENDER_OPTIONS" appendTo="body" class="ictu-form__input-field" formControlName="gender" placeholder="Giới tính"/>
						</div>
					</div>
					<div class="col-4">
						<div class="ictu-form__row">
							<label class="ictu-form__label" [class.ictu-form__label--required]="getControl('dob').hasValidator(Validators.required)">Ngày sinh</label>
							<p-inputmask class="ictu-form__input-field" formControlName="dob" mask="99/99/9999" placeholder="dd/mm/yyyy" slotChar="--/--/----"/>
						</div>
					</div>
					<div class="col-4">
						<div class="ictu-form__row">
							<label class="ictu-form__label" [class.ictu-form__label--required]="getControl('linhvuc_id').hasValidator(Validators.required)">Lĩnh vực chuyên môn</label>
							<p-select [options]="dmLinhVuc()" appendTo="body" class="ictu-form__input-field" emptyMessage="không có lĩnh vực chuyên môn" formControlName="linhvuc_id" placeholder="Lĩnh vực chuyên môn"/>
						</div>
					</div>
				</div>
			</div>
			<div class="ictu-form__row">
				<div class="row">
					<div class="col-4">
						<div class="ictu-form__row">
							<label class="ictu-form__label" [class.ictu-form__label--required]="getControl('email').hasValidator(Validators.required)">Email</label>
							<input class="ictu-form__input-field" formControlName="email" pInputText placeholder="Email" type="text">
						</div>
					</div>
					<div class="col-4">
						<div class="ictu-form__row">
							<label class="ictu-form__label" [class.ictu-form__label--required]="getControl('phone').hasValidator(Validators.required)">Số điện thoại</label>
							<input class="ictu-form__input-field" formControlName="phone" pInputText placeholder="Số điện thoại liên hệ" type="text">
						</div>
					</div>
					<!-- <div class="col-4">
						<div class="ictu-form__row">
							<label class="ictu-form__label" [class.ictu-form__label&#45;&#45;required]="getControl('origin').hasValidator(Validators.required)">Nguồn gốc</label>
							<p-select [options]="EMPLOYEE_ORIGIN_OPTIONS" appendTo="body" class="ictu-form__input-field" formControlName="origin" placeholder="&#45;&#45; Loại giáo viên &#45;&#45;"/>
						</div>
					</div> -->
				</div>
			</div>
			<div class="ictu-form__row">
				<div class="row">
					<div class="col-4">
						<div class="ictu-form__row">
							<label class="ictu-form__label" [class.ictu-form__label--required]="getControl('academic_degree').hasValidator(Validators.required)">Học vị</label>
							<p-select [options]="ACADEMIC_DEGREE_OPTIONS" [showClear]="true" appendTo="body" class="ictu-form__input-field" formControlName="academic_degree" placeholder="Học vị"/>
						</div>
					</div>
					<div class="col-4">
						<div class="ictu-form__row">
							<label class="ictu-form__label" [class.ictu-form__label--required]="getControl('academic_rank').hasValidator(Validators.required)">Học hàm</label>
							<p-select [options]="ACADEMIC_RANK_OPTIONS" [showClear]="true" appendTo="body" class="ictu-form__input-field" formControlName="academic_rank" placeholder="Học hàm"/>
						</div>
					</div>
					<div class="col-4">
						<div class="ictu-form__row">
							<label class="ictu-form__label" [class.ictu-form__label--required]="getControl('nationality').hasValidator(Validators.required)" for="em_nationality">Quốc tịch</label>
							<input class="ictu-form__input-field" formControlName="nationality" id="em_nationality" pInputText placeholder="Quốc tịch" type="text">
						</div>
					</div>
				</div>
			</div>
			<div class="ictu-form__row">
				<div class="row">
					<div class="col-4">
						<div class="ictu-form__row">
							<label class="ictu-form__label" for="em_lang" [class.ictu-form__label--required]="getControl('language').hasValidator(Validators.required)">Ngôn ngữ</label>
							<input class="ictu-form__input-field" formControlName="language" id="em_lang" pInputText pTextarea placeholder="Ngôn ngữ" type="text">
						</div>
					</div>
					<div class="col-4">
						<div class="ictu-form__row">
							<label class="ictu-form__label" for="em_workplace_name" [class.ictu-form__label--required]="getControl('workplace').hasValidator(Validators.required)">Đơn vị công tác</label>
							<input class="ictu-form__input-field" formControlName="workplace" id="em_workplace_name" pInputText pTextarea placeholder="Tên đơn vị đang công tác" type="text">
						</div>
					</div>
					<div class="col-4">
						<div class="ictu-form__row">
							<label class="ictu-form__label" for="em_workplace_position" [class.ictu-form__label--required]="getControl('workplace_position').hasValidator(Validators.required)">Chức vụ</label>
							<input class="ictu-form__input-field" formControlName="workplace_position" id="em_workplace_position" pInputText pTextarea placeholder="Chức vụ tại đơn vị đang công tác" type="text">
						</div>
					</div>
				</div>
			</div>
			<div class="ictu-form__row">
				<label class="ictu-form__label" [class.ictu-form__label--required]="getControl('contract_status').hasValidator(Validators.required)">Trạng thái hợp đồng</label>
				<p-select [options]="EMPLOYEE_CONTRACT_STATUS_OPTIONS" appendTo="body" class="ictu-form__input-field" formControlName="contract_status" placeholder="-- Trạng thái hợp đồng --"/>
			</div>
			<div class="d-flex justify-content-end align-items-center w-100">
				<small class="ictu-form-guide f-roboto my-0 ms-0 me-auto fw-normal text-muted text-left" style="font-size: 13px;">Những trường đánh dấu (*) là những trường bắt buộc, không được bỏ trống</small>
				<!-- <button (click)="btnSubmit()" [disabled]="!(formGroup.valid && formGroup.touched)" class="card-2-footer__button btn ictu-badge-btn&#45;&#45;success-reverse" mat-flat-button>Lưu lại</button> -->
			</div>
		</form>
	}
</div>
