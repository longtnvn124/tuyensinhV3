<mat-drawer-container [autosize]="true" [ngClass]="{ 'ictu-desktop-sidebar--collapsed':sidebarCollapsed() }" class="drawer-container">
	<mat-drawer [disableClose]="true" [mode]="drawerMode()" [ngStyle]="resizeStyle()" class="pc-sidebar" opened>
		<nav>
			<div class="navbar-wrapper">
				<div class="m-header position-relative" style="z-index: 5">
					<div class="flex align-items-center w-100 h-100">
						<button (click)="toggleMenu()" class="btn ictu-badge-btn--secondary navbar-wrapper__btn-toggle--left" mat-flat-button>
							<!-- <svg class="navbar-wrapper__btn-toggle__icon" fill="currentColor" viewBox="0 0 24 24">
								<path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"></path>
							</svg> -->
							<!-- <svg class="navbar-wrapper__btn-toggle__icon" style="aspect-ratio: 1">
								<use [attr.href]="'fonts/custom-icon.svg#custom-sidebar-'+ (sidebarCollapsed() ? 'show' : 'hide')"></use>
							</svg> -->
							<svg class="navbar-wrapper__btn-toggle__icon" height="512" style="aspect-ratio: 1;color: #444;" viewBox="0 0 24 24" width="512" xmlns="http://www.w3.org/2000/svg">
								<g>
									<path d="m20.9 18h-16v2h16z" fill="currentColor"/>
									<path d="m20.9 4h-16v2h16z" fill="currentColor"/>
									<path d="m20.9 8.7h-7.4v2h7.4z" fill="currentColor"/>
									<path d="m20.9 13.3h-7.4v2h7.4z" fill="currentColor"/>
									@if (sidebarCollapsed()) {
										<path clip-rule="evenodd" d="m4 8v7.9l6.1-4z" fill-rule="evenodd" fill="currentColor"/>
									} @else {
										<path clip-rule="evenodd" d="m10.1 8-6.1 3.9 6.1 4z" fill-rule="evenodd" fill="currentColor"/>
									}
								</g>
							</svg>
						</button>
						<div class="d-inline-flex flex-fill align-items-center">
							<div class="m-header__logo" style="line-height: 1">
								<img [ngSrc]="logo()" alt="" height="55" priority="priority" width="55">
							</div>
							<div class="flex-column flex-fill flex">
								<span class="version">v{{ currentApplicationVersion() }}</span>
								<code class="domain-deploy">{{ hostname() }}</code>
							</div>
						</div>
					</div>
				</div>
				<ictu-vertical-menu [collapsed]="sidebarCollapsed()" [menus]="menus"/>
			</div>
		</nav>
	</mat-drawer>
	<!-- <app-nav-bar></app-nav-bar> -->
	<div class="app-container">
		<!-- <app-breadcrumb></app-breadcrumb> -->
		<div class="main-body">
			<div class="page-wrapper">
				<router-outlet></router-outlet>
			</div>
		</div>
	</div>
	<!--<app-footer></app-footer> -->
</mat-drawer-container>
