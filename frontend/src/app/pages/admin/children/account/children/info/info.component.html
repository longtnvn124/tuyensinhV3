<section class="admin-standard-layout position-relative">
    <div class="admin-standard-layout__header">
        <h4 class="admin-wrap-table__heading">
            <svg>
                <use href="fonts/custom-icon.svg#custom-user-circle-2"></use>
            </svg>
            Thông tin tài khoản
        </h4>
    </div>
    <div class="admin-standard-layout__body w-100">
        <div class="admin-standard-layout__body__inner">
            @if (state() === 'loading') {
                <div class="d-flex position-relative" style="min-height: calc(var(--device-height) - 66px)">
                    <app-loading-progress heading="Loading..." backdropFilter="none"></app-loading-progress>
                </div>
            } @else {
                <div class="row">
                    <div class="col-12">
                        <div class="card card-2 bg-white">
                            <div class="card-2-body position-relative py-0">
                                <ul class="nav nav-tabs profile-tabs" role="tablist">
                                    <li class="nav-item" role="presentation">
                                        <a (click)="activeTab('USER',$event)" [class.active]="tabActive()==='USER'" class="nav-link" href="#"><i class="ti ti-id"></i>Tài khoản</a>
                                    </li>
                                    @if (profileType() === 'employee') {
                                        <li class="nav-item" role="presentation">
                                            <a (click)="activeTab('PROFILE',$event)" [class.active]="tabActive()==='PROFILE'" class="nav-link" href="#"><i class="ti ti-user"></i>Hồ sơ</a>
                                        </li>
                                        <li class="nav-item" role="presentation">
                                            <a (click)="activeTab('ABOUT_ME',$event)" [class.active]="tabActive()==='ABOUT_ME'" class="nav-link" href="#"><i class="ti ti-file-text me-2"></i>Thông tin cá nhân</a>
                                        </li>
                                    }
                                    <li class="nav-item" role="presentation">
                                        <a (click)="activeTab('SETTINGS',$event)" [class.active]="tabActive()==='SETTINGS'" class="nav-link" href="#"><i class="ti ti-settings"></i>Cài đặt</a>
                                    </li>
                                </ul>
                            </div>
                        </div>
                        <div class="tab-content">
                            @switch (tabActive()) {
                                @case ('USER') {
                                    <account-info-tab-user></account-info-tab-user>
                                }
                                @case ('PROFILE') {
                
                                }
                                @case ('ABOUT_ME') {
                                  
                                }
                                @default {
                                    <account-info-tab-settings></account-info-tab-settings>
                                }
                            }
                        </div>
                    </div>
                </div>
            }
        </div>
    </div>
</section>
