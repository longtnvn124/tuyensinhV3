<form [formGroup]="formData" class="hoso-them__form">

    <!-- Section 1: Thông tin cá nhân -->
    <section class="hoso-form__section">
        <h6 class="hoso-form__section-title">1. Thông tin cá nhân</h6>
        <div class="ictu-form ictu-form--label-on-top">
            <div class="ictu-form__row ictu-form__row--two">
                <ovic-img-crop-v2 [formField]="formData['anh_the']"  ></ovic-img-crop-v2>
            </div>
            <div class="ictu-form__row">
                <label class="ictu-form__label ictu-form__label--required">Họ và tên</label>
                <input class="ictu-form__input-field" formControlName="full_name" pInputText type="text"
                    placeholder="Nguyễn Văn A" />
            </div>
            <div class="ictu-form__row ictu-form__row--two">
                <div>
                    <label class="ictu-form__label ictu-form__label--required">Số điện thoại</label>
                    <input class="ictu-form__input-field" formControlName="phone" pInputText type="text"
                        placeholder="09xx..." />
                </div>
                <div>
                    <label class="ictu-form__label">Email</label>
                    <input class="ictu-form__input-field" formControlName="email" pInputText
                        type="email" placeholder="email@example.com" />
                </div>
            </div>
            <div class="ictu-form__row ictu-form__row--two">
                <div>
                    <label class="ictu-form__label">Ngày sinh</label>
                    <input class="ictu-form__input-field" formControlName="birthday" pInputText
                        type="date" />
                </div>
                <div>
                    <label class="ictu-form__label">Dân tộc</label>
                    <p-select [options]="listDantoc()" appendTo="body" formControlName="dan_toc"
                        placeholder="Chọn dân tộc" optionLabel="label" optionValue="label"
                        [showClear]="true" />
                </div>
            </div>
            <div class="ictu-form__row ictu-form__row--two">
                <div>
                    <label class="ictu-form__label">Tỉnh/TP</label>
                    <p-select [options]="listTinh()" appendTo="body" formControlName="tinh_id"
                        placeholder="Chọn tỉnh" optionLabel="name" optionValue="id"
                        [showClear]="true" (onChange)="onTinhChange($event.value)" />
                </div>
                <div>
                    <label class="ictu-form__label">Quận/Huyện</label>
                    <p-select [options]="listHuyen()" appendTo="body" formControlName="huyen_id"
                        placeholder="Chọn huyện" optionLabel="name" optionValue="id"
                        [showClear]="true" (onChange)="onHuyenChange($event.value)" />
                </div>
            </div>
            <div class="ictu-form__row ictu-form__row--two">
                <div>
                    <label class="ictu-form__label">Xã/Phường</label>
                    <p-select [options]="listXa()" appendTo="body" formControlName="xa_id"
                        placeholder="Chọn xã" optionLabel="name" optionValue="id"
                        [showClear]="true" />
                </div>
                <div>
                    <label class="ictu-form__label">Địa chỉ chi tiết</label>
                    <textarea class="ictu-form__input-field" formControlName="address" pTextarea
                        placeholder="Số nhà, ngõ, đường..." rows="2"></textarea>
                </div>
            </div>
            <div class="ictu-form__row ictu-form__row--two">
                <div>
                    <label class="ictu-form__label">Nơi sinh</label>
                    <input class="ictu-form__input-field" formControlName="noi_sinh" pInputText
                        type="text" placeholder="Tỉnh/TP" />
                </div>
                <div>
                    <label class="ictu-form__label">Nguồn đăng ký</label>
                    <p-select [options]="nguonOptions" appendTo="body" formControlName="nguon_dang_ky"
                        placeholder="Nguồn" optionLabel="label" optionValue="value" />
                </div>
            </div>
            <div class="ictu-form__row ictu-form__row--two">
                <div>
                    <label class="ictu-form__label">Hình thức xét tuyển</label>
                    <p-select [options]="hinhthucOptions" appendTo="body"
                        formControlName="hinhthuc_xettuyen" placeholder="Hình thức" optionLabel="label"
                        optionValue="value" />
                </div>
                <div></div>
            </div>
        </div>
    </section>

    <!-- Section 2: CCCD -->
    <section class="hoso-form__section">
        <h6 class="hoso-form__section-title">2. CCCD</h6>
        <div class="ictu-form ictu-form--label-on-top">
            <div class="ictu-form__row ictu-form__row--two">
                <app-upload-placeholder label="Ảnh CCCD mặt trước"></app-upload-placeholder>
                <app-upload-placeholder label="Ảnh CCCD mặt sau"></app-upload-placeholder>
            </div>
            <div class="ictu-form__row ictu-form__row--two">
                <div>
                    <label class="ictu-form__label">Số CCCD</label>
                    <input class="ictu-form__input-field" formControlName="cccd" pInputText type="text"
                        readonly />
                </div>
                <div>
                    <label class="ictu-form__label">Ngày cấp</label>
                    <input class="ictu-form__input-field" formControlName="cccd_ngaycap" pInputText
                        type="date" />
                </div>
            </div>
            <div class="ictu-form__row">
                <label class="ictu-form__label">Nơi cấp</label>
                <input class="ictu-form__input-field" formControlName="cccd_noicap" pInputText
                    type="text" placeholder="Cục CSĐKXC & CTTH" />
            </div>
        </div>
    </section>

    <!-- Section 3: Văn bằng TN THPT -->
    <section class="hoso-form__section">
        <h6 class="hoso-form__section-title">3. Văn bằng TN THPT</h6>
        <div class="ictu-form ictu-form--label-on-top">
            <div class="ictu-form__row">
                <app-upload-placeholder label="Ảnh văn bằng tốt nghiệp"></app-upload-placeholder>
            </div>
            <div class="ictu-form__row ictu-form__row--two">
                <div>
                    <label class="ictu-form__label">Loại văn bằng</label>
                    <input class="ictu-form__input-field" formControlName="van_bang_tn" pInputText
                        type="text" />
                </div>
                <div>
                    <label class="ictu-form__label">Năm tốt nghiệp</label>
                    <input class="ictu-form__input-field" formControlName="nam_tn" pInputText
                        type="text" />
                </div>
            </div>
            <div class="ictu-form__row ictu-form__row--two">
                <div>
                    <label class="ictu-form__label">Số hiệu văn bằng</label>
                    <input class="ictu-form__input-field" formControlName="sohieu_vb" pInputText
                        type="text" />
                </div>
                <div></div>
            </div>
        </div>
    </section>

    <!-- Section 4: Văn bằng chuyên môn -->
    <section class="hoso-form__section">
        <h6 class="hoso-form__section-title">4. Văn bằng chuyên môn (khác)</h6>
        <div class="ictu-form ictu-form--label-on-top">
            <div class="ictu-form__row">
                <label class="ictu-form__label">Tên văn bằng</label>
                <input class="ictu-form__input-field" formControlName="vb_chuyenmon" pInputText
                    type="text" />
            </div>
            <div class="ictu-form__row ictu-form__row--two">
                <div>
                    <label class="ictu-form__label">Ngành học</label>
                    <input class="ictu-form__input-field" formControlName="vb_chuyenmon_nganh"
                        pInputText type="text" />
                </div>
                <div>
                    <label class="ictu-form__label">Nơi cấp</label>
                    <input class="ictu-form__input-field" formControlName="vb_chuyenmon_noicap"
                        pInputText type="text" />
                </div>
            </div>
        </div>
    </section>

</form>

<!-- Form footer -->
<div class="hoso-them__form-footer">
    <button (click)="closeForm()" class="btn ictu-badge-btn--secondary" mat-flat-button>
        <i class="ti ti-arrow-left"></i>
        <span>Hủy</span>
    </button>
    <button (click)="resetForm()" class="btn ictu-badge-btn--secondary" mat-flat-button>
        <i class="ti ti-refresh"></i>
        <span>Reset</span>
    </button>
    <button (click)="submitData()" [disabled]="!formData.valid || submitting()"
        class="btn ictu-badge-btn--success-reverse" mat-flat-button>
        <i class="ti ti-plus"></i>
        <span>Thêm mới</span>
    </button>
</div>
