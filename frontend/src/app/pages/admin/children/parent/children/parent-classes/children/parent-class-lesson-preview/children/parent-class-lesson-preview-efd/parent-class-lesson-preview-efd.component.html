@switch (state()) {
    @case ('success') {
        @if (images().length) {
            <div class="parent-class-lesson-preview-efd overflow-hidden">
                <app-flip-book [images]="images()" [height]="'calc(var(--device-height) - 60px - 30px - 50px - 15px)'"></app-flip-book>
            </div>
        } @else {
            <span class="ictu-badge ictu-badge--warning f-roboto fw-normal lh-base p-y-10 p-x-15 f-14" style="color: #444444;background-color: #e9ecef;">Không có tài liệu.</span>
        }
    }
    @case ('error') {
        <div class="parent-class-lesson-preview-efd overflow-hidden">
            <div class="admin-table__alert-danger text-center alert-danger w-100 p-10">Tải dữ liệu thất bại. Vui lòng chọn
                <a (click)="btnReload($event)" href="javascript:" class="admin-table__alert-danger__btn-reload">tải lại</a>
            </div>
        </div>
    }
    @default {
        <div class="parent-class-lesson-preview-efd overflow-hidden">
            <div class="parent-class-lesson-preview-efd__loading-layout d-flex align-items-center justify-content-center gap-2">
                <span class="f-roboto f-14 lh-base fw-normal">Waiting...</span>
                <span class="spinner-border spinner-border-sm text-danger"></span>
            </div>
        </div>
    }
}
