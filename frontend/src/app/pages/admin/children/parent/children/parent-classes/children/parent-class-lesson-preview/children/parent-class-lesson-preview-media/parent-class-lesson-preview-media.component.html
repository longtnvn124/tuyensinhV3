@if (medias()?.length) {
    <div class="parent-class-lesson-preview-media p-0 edit-course-lesson-structure-media d-flex flex-column ms-auto me-auto">
        <div class="edit-course-lesson-structure-media__body d-flex flex-column m-0">
            <ul class="edit-course-lesson-structure-media__list p-0 m-0 d-flex flex-wrap">
                @for (_media of medias(); track _media; let i = $index) {
                    <li class="edit-course-lesson-structure-media__list__elm">
                        @switch (_media.mediaType) {
                            @case ('video') {
                                <app-edit-course-lesson-structure-media-video [media]="_media" [previewMode]="true"></app-edit-course-lesson-structure-media-video>
                            }
                            @case ('audio') {
                                <app-edit-course-lesson-structure-media-audio [media]="_media" [previewMode]="true"></app-edit-course-lesson-structure-media-audio>
                            }
                            @case ('picture') {
                                <app-edit-course-lesson-structure-media-picture [media]="_media" [previewMode]="true"></app-edit-course-lesson-structure-media-picture>
                            }
                            @case ('document') {
                                <app-edit-course-lesson-structure-media-document [media]="_media" [previewMode]="true"></app-edit-course-lesson-structure-media-document>
                            }
                            @default {

                            }
                        }
                    </li>
                }
            </ul>
        </div>
    </div>
} @else {
    <span class="ictu-badge ictu-badge--warning f-roboto fw-normal lh-base p-y-10 p-x-15 f-14" style="color: #444444;background-color: #e9ecef;">Không có dữ liệu.</span>
}
