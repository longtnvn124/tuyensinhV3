&lt;!&ndash; <p-drawer #pDrawer (onHide)="onDrawerHide()" [(visible)]="formControl.visible" [dismissible]="false" [header]="formControl.heading()" [style]="{'width':'600px', 'max-width':'100%'}" appendTo="body" position="right" styleClass="ictu-p-drawer">
	<div class="ictu-p-drawer__content position-relative">
		@if (formControl.enableLoading()) {
			<app-loading-progress [heading]="formControl.loadingLabel()" backdropFilter="none"></app-loading-progress>

		}
		<div class="ictu-p-drawer__content__body position-relative">
			@switch (formControl.state()) {
				@case ('READY') {
					<form [formGroup]="formControl.formGroup">
						<div class="ictu-form ictu-form&#45;&#45;label-on-top">
							<div class="ictu-form__row">
								<label class="ictu-form__label ictu-form__label&#45;&#45;required" for="f_phonghoc">Phòng học</label>
								<p-select [options]="optionPhongHoc" appendTo="body" class="ictu-form__input-field" formControlName="phonghoc_id" placeholder="Chọn phòng học" optionLabel="name" optionValue="id"/>
							</div>
							<div class="ictu-form__row">
								<label class="ictu-form__label ictu-form__label&#45;&#45;required" for="f_diadiem">Địa điểm</label>
								<textarea class="ictu-form__input-field" formControlName="diadiem_phonghoc" id="f_diadiem" pTextarea placeholder="Địa điểm"></textarea>
							</div>
							<div class="ictu-form__row">
								<label class="ictu-form__label ictu-form__label&#45;&#45;required" for="f_desc">Mô tả</label>
								<textarea class="ictu-form__input-field" formControlName="content" id="f_desc" pTextarea placeholder="Thêm mô tả cho khóa học"></textarea>
							</div>
							<div class="ictu-form__row">
								<label class="ictu-form__label ictu-form__label&#45;&#45;required" for="f_capacity">Hình thức</label>
								<p-select [options]="optiontype" appendTo="body" class="ictu-form__input-field" formControlName="type" placeholder="Trạng thái"/>
							</div>
							<div class="ictu-form__row">
								<div class="row">
									<div class="col-6">
										<div class="ictu-form__row" style="padding-top: 6px;">
                                            <label class="ictu-form__label ictu-form__label&#45;&#45;required" for="f_timestart"  style="margin-bottom: 10px;">Thời gian giảng dạy</label>
                                            <p-datepicker formControlName="time_start" class="ictu-form__input-field" id="f_timestart" [showIcon]="true" inputId="buttondisplay" [showOnFocus]="false" placeholder="Chọn thời gian"/>
                                        </div>
									</div>
									<div class="col-6">
										<div class="ictu-form__row">
											<label class="ictu-form__label ictu-form__label&#45;&#45;required">Trạng thái</label>
											<p-select [options]="optionList" appendTo="body" class="ictu-form__input-field" formControlName="status" placeholder="Trạng thái"/>
										</div>
									</div>
								</div>
							</div>
						</div>
					</form>
				}
				@case ('PREPARATION_FAILED') {
					<div class="admin-table__alert-danger text-center w-100">Tải dữ liệu thất bại. Vui lòng chọn
						<a (click)="formControl.preparation()" href="javascript:" class="admin-table__alert-danger__btn-reload">tải lại</a>
					</div>
				}
			}

		</div>
		<div class="ictu-p-drawer__content__footer">
			<button (click)="pDrawer.close($event)" class="btn ictu-badge-btn&#45;&#45;secondary" mat-flat-button>Hủy</button>
			<button (click)="submitForm()" [disabled]="!formControl.formFilledAndValid" class="btn ictu-badge-btn&#45;&#45;primary-reverse" mat-flat-button>Lưu lại</button>
		</div>
	</div>
</p-drawer> &ndash;&gt;
