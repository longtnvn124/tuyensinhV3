<div class="auth-page">
    <div class="auth-page__bg">
        <div class="auth-page__grid"></div>
        <div class="auth-page__glow auth-page__glow--1"></div>
        <div class="auth-page__glow auth-page__glow--2"></div>
    </div>
    <div class="auth-page__container">
        <div class="auth-card">
            @if (loading()) {
                <app-loading-progress heading="Loading..." backdropFilter="blur(1px)"/>
            }
            <div class="auth-card__header">
                <div class="auth-card__logo">
                    <img class="w-100 h-100" src="/images/logo-ictu.png" > 
                </div>
                <h1 class="auth-card__title">HỆ THỐNG QUẢN LÝ</h1>
                <p class="auth-card__subtitle">DỮ LIỆU TUYỂN SINH ĐÀO TẠO TỪ XA</p>
            </div>
            <form [formGroup]="formGroup" class="auth-form">
                <div class="auth-form__field">
                    <label class="auth-form__label" for="username">Tài khoản</label>
                    <div class="auth-form__input-group">
                        <svg class="auth-form__input-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                        <input tabindex="0" (keydown.enter)="enterOnUsernameField($event, passwordInputField)" autocomplete="username" class="auth-form__input" formControlName="username" id="username" placeholder="Mã sinh viên hoặc email" type="text">
                    </div>
                </div>
                <div class="auth-form__field">
                    <label class="auth-form__label" for="password">Mật khẩu</label>
                    <div class="auth-form__input-group">
                        <svg class="auth-form__input-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input #passwordInputField tabindex="0" (keydown.enter)="onEnter($event)" [type]="hide ? 'password' : 'text'" autocomplete="password" class="auth-form__input auth-form__input--with-toggle" formControlName="password" id="password" placeholder="Nhập mật khẩu">
                        <button tabindex="-1" type="button" class="auth-form__toggle-pw" (click)="hide = !hide" [attr.aria-label]="'Hide password'" [attr.aria-pressed]="hide">
                            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                @if (hide) {
                                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                                    <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                                    <line x1="1" y1="1" x2="23" y2="23"/>
                                    <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/>
                                } @else {
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                }
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="auth-form__options">
                    <mat-checkbox checked class="auth-form__checkbox" color="primary" tabIndex="0">Ghi nhớ đăng nhập</mat-checkbox>
                    <a tabIndex="0" class="auth-form__link" routerLink="/auth/forgot-password">Quên mật khẩu?</a>
                </div>
                <button tabindex="0" (click)="submit()" [disabled]="formGroup.invalid" class="auth-form__submit" pButton pRipple style="height:48px">
                    <i class="pi pi-sign-in" pButtonIcon></i>
                    <span pButtonLabel>Đăng nhập</span>
                </button>  
                @if (enableSignInWithThirdParty()) {
                    <div class="auth-form__divider">
                        <span>Hoặc đăng nhập bằng</span>
                    </div>
                    <div class="auth-form__third-party ">
                        @if (enableSignInWithGoogle()) {
                            <button tabIndex="0" (click)="btnSignInWithThirdPartyAccounts('google')" class="auth-form__third-party__btn" pButton pRipple severity="secondary" style="height:48px">
                                <svg pButtonIcon width="18" height="18" viewBox="0 0 18 18">
                                    <path fill="#4285f4" d="M17.64 9.2q-.002-.956-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/>
                                    <path fill="#34a853" d="M9.003 18c2.43 0 4.467-.806 5.956-2.18l-2.909-2.26c-.806.54-1.836.86-3.047.86-2.344 0-4.328-1.584-5.036-3.711H.96v2.332C2.44 15.983 5.485 18 9.003 18"/>
                                    <path fill="#fbbc05" d="M3.964 10.712c-.18-.54-.282-1.117-.282-1.71 0-.593.102-1.17.282-1.71V4.96H.957C.347 6.175 0 7.55 0 9.002c0 1.452.348 2.827.957 4.042z"/>
                                    <path fill="#ea4335" d="M9.003 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.464.891 11.428 0 9.002 0 5.485 0 2.44 2.017.96 4.958L3.967 7.29c.708-2.127 2.692-3.71 5.036-3.71"/>
                                </svg>
                                <span pButtonLabel>Google</span>
                            </button>
                        }
                    
                    </div>
                }
                <span class="auth-form__version">{{ appVersion() }}</span>
            </form>
        </div>
    </div>
</div>
