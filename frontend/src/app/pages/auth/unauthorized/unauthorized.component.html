<div class="auth-page">
    <div class="auth-page__bg">
        <div class="auth-page__grid"></div>
        <div class="auth-page__glow auth-page__glow--1"></div>
        <div class="auth-page__glow auth-page__glow--2"></div>
    </div>
    <div class="auth-page__container">
        <div class="auth-card">
            <div class="auth-card__header">
                <div class="auth-card__icon auth-card__icon--error">
                    <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                </div>
                <h1 class="auth-card__title">Truy cập bị từ chối</h1>
                <p class="auth-card__subtitle">Bạn không có quyền truy cập vào trang này.</p>
                <p class="auth-card__message" style="text-align:center;margin-top:12px">Vui lòng liên hệ quản trị viên nếu bạn cho rằng đây là lỗi.</p>
            </div>
            <a routerLink="/auth/login" class="auth-form__back-link">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                    <polyline points="9 22 9 12 15 12 15 22"/>
                </svg>
                Quay lại trang đăng nhập
            </a>
        </div>
    </div>
</div>
