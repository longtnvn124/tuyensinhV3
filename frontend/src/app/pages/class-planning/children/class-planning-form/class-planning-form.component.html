<div class="class-planning-form d-flex justify-content-center align-items-start position-relative">
    @if (state() === 'error') {
        <div class="d-flex justify-content-center align-items-center position-relative w-100 h-100">
            <div class="admin-table__alert-danger text-center">Tải dữ liệu thất bại. Vui lòng chọn
                <a (click)="reload($event)" href="javascript:" class="admin-table__alert-danger__btn-reload">tải lại</a>
            </div>
        </div>
    } @else {
        <div class="class-planning-form__body w-100">
            <div class="class-planning-form__container">
                <div class="class-planning-form__section class-planning-form__section--header">
                    <h4 class="class-planning-form__heading">{{ formHeading() }}</h4>
                </div>
                <hr class="class-planning-form__hr m-0 position-relative z-2">
                <form [formGroup]="formGroup" class="d-block ictu-form p-0 position-relative z-1">
                    <div class="class-planning-form__section">
                        <div class="row">
                            <div class="col-sm-4 col-12">
                                <div class="ictu-form__row">
                                    <label [class.ictu-form__label--required]="getControl('code').hasValidator(formValidators.required)" class="ictu-form__label ictu-form__label lh-1" for="f_code">Mã lớp học</label>
                                    <input class="ictu-form__input-field" formControlName="code" id="f_code" pInputText type="text">
                                </div>
                            </div>
                            <div class="col-sm-8 col-12">
                                <div class="ictu-form__row">
                                    <label [class.ictu-form__label--required]="getControl('name').hasValidator(formValidators.required)" class="ictu-form__label ictu-form__label lh-1" for="f_name">Tên lớp</label>
                                    <input class="ictu-form__input-field" formControlName="name" id="f_name" pInputText placeholder="Tên lớp học" type="text">
                                </div>
                            </div>
                        </div>
                        <div class="ictu-form__row">
                            <label [class.ictu-form__label--required]="getControl('desc').hasValidator(formValidators.required)" class="ictu-form__label ictu-form__label lh-1" for="f_desc">Mô tả</label>
                            <textarea class="ictu-form__input-field" formControlName="desc" id="f_desc" pTextarea placeholder="Mô tả" type="text"></textarea>
                        </div>
                        <div class="ictu-form__row">
                            <label [class.ictu-form__label--required]="getControl('csdt_id').hasValidator(formValidators.required)" class="ictu-form__label ictu-form__label lh-1" for="f_csdt_id">Cơ sở đào tạo</label>
                            <p-select [options]="branchOptions()" appendTo="body" class="ictu-form__input-field" formControlName="csdt_id" id="f_csdt_id" placeholder="Chọn khóa học"/>
                        </div>
                        <div class="row">
                            <div class="col-12 col-sm-6">
                                <div class="ictu-form__row">
                                    <label [class.ictu-form__label--required]="getControl('learning_mode').hasValidator(formValidators.required)" class="ictu-form__label ictu-form__label lh-1" for="learning_mode_select">Hình thức học</label>
                                    <p-select [options]="learningModeOptions()" appendTo="body" class="ictu-form__input-field" inputId="learning_mode_select" formControlName="learning_mode" placeholder="Chọn hình thức học"/>
                                </div>
                            </div>
                            <div class="col-12 col-sm-6">
                                <div class="ictu-form__row">
                                    <label [class.ictu-form__label--required]="getControl('course_id').hasValidator(formValidators.required)" class="ictu-form__label ictu-form__label lh-1">Khóa học</label>
                                    <p-select (onChange)="getClassDuration($event)" [options]="courseOptions()" appendTo="body" class="ictu-form__input-field" formControlName="course_id" placeholder="Chọn khóa học"/>
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-sm-6 col-12">
                                <div class="ictu-form__row">
                                    <label [class.ictu-form__label--required]="getControl('started_date').hasValidator(formValidators.required)" class="ictu-form__label ictu-form__label lh-1" for="f_started_date">Ngày khai giảng</label>
                                    <p-datepicker [showIcon]="true" [showOnFocus]="false" class="ictu-form__input-field" dateFormat="dd/mm/yy" formControlName="started_date" id="f_started_date" inputId="buttondisplay"></p-datepicker>
                                </div>
                            </div>
                            <div class="col-sm-6 col-12">
                                <div class="ictu-form__row">
                                    <label class="ictu-form__label ictu-form__label lh-1">Thời lượng</label>
                                    <div class="ictu-form__group-control--after" style="--ictu-form-group-after-input-width:80px">
                                        <span class="ictu-form__input-field" style="--p-inputtext-disabled-background: #f8fafc;--p-inputtext-border-color: #cbd5e1;user-select: none;">{{ getControl('duration').value }}</span>
                                        <span class="ictu-form__after-input-field" style="cursor: auto">
											<span class="f-roboto f-14 fw-normal m-0">Buổi học</span>
										</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <!-- <div class="row">
                            <div class="col-sm-6 col-12">
                                <div class="ictu-form__row">
                                    <label [class.ictu-form__label&#45;&#45;required]="getControl('user_id_teacher').hasValidator(formValidators.required)" class="ictu-form__label ictu-form__label lh-1">Giáo viên</label>
                                    <employee-control-2 [formControlObj]="getControl('user_id_teacher')" filterByRole="teacher" placeholder="&#45;&#45; Chọn giáo viên &#45;&#45;" objectLabel="giáo viên"/>
                                </div>
                            </div>
                            <div class="col-sm-6 col-12">
                                <div class="ictu-form__row">
                                    <label [class.ictu-form__label&#45;&#45;required]="getControl('user_id_foreign_teacher').hasValidator(formValidators.required)" class="ictu-form__label ictu-form__label lh-1">Giáo viên nước ngoài ( Nếu có )</label>
                                    <employee-control-2 [formControlObj]="getControl('user_id_foreign_teacher')" filterByRole="teacher" placeholder="&#45;&#45; Chọn giáo viên &#45;&#45;" objectLabel="giáo viên"/>
                                </div>
                            </div>
                        </div> -->
                        <div class="ictu-form__row">
                            <label [class.ictu-form__label--required]="getControl('teacher_ids').hasValidator(formValidators.required)" class="ictu-form__label ictu-form__label lh-1" for="assistant_ids">Giáo viên</label>
                            <employee-control-multiple [formControlObj]="getControl('teacher_ids')" filterByRole="teacher" placeholder="-- Chọn giảng viên --" objectLabel="giáo viên"/>
                        </div>
                        <div class="ictu-form__row">
                            <label [class.ictu-form__label--required]="getControl('assistant_ids').hasValidator(formValidators.required)" class="ictu-form__label ictu-form__label lh-1" for="f_user_ids_assistants">Trợ giảng</label>
                            <employee-control-multiple [formControlObj]="getControl('assistant_ids')" filterByRole="teaching_assistant" placeholder="-- Chọn trợ giảng --" objectLabel="trợ giảng"/>
                        </div>
                        <div class="ictu-form__row">
                            <label [class.ictu-form__label--required]="getControl('status').hasValidator(formValidators.required)" class="ictu-form__label ictu-form__label lh-1">Trạng thái</label>
                            <p-select [options]="STATUS_OPTIONS()" appendTo="body" class="ictu-form__input-field" formControlName="status" placeholder="Trạng thái"/>
                        </div>
                    </div>
                </form>
                <hr class="class-planning-form__hr m-0">
                <div class="class-planning-form__section class-planning-form__section--footer d-flex justify-content-end align-items-center">
                    <button (click)="submitData()" [disabled]="!formGroup.touched || formGroup.invalid" class="btn ictu-badge-btn--primary-reverse" mat-flat-button>Lưu lại</button>
                </div>
            </div>
        </div>
    }
</div>
