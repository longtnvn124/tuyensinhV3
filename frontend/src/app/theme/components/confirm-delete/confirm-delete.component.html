<div class="app-confirm-wrap ictu-confirm-delete">
	<button (click)="dismiss($event)" class="btn ictu-button-danger-light ictu-confirm-delete__btn-dismiss">
		<svg fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path clip-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" fill-rule="evenodd"></path></svg>
	</button>
	<div class="ictu-confirm-delete__head">
		<svg fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg"><path clip-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" fill-rule="evenodd"></path></svg>
	</div>
	<div class="ictu-confirm-delete__body">
		<p class="ictu-confirm-delete__body__message">{{ message() }}</p>
		@if (data.amount > 1) {
			<small class="ictu-confirm-delete__body__desc">(Tổng cộng {{ data.amount }} mục)</small>
		}
	</div>
	<div class="ictu-confirm-delete__foot">
		<button (click)="confirm($event, false)" class="btn ictu-badge-btn--primary-reverse" mat-flat-button>Không, hủy bỏ</button>
		<button (click)="confirm($event, true)" class="btn ictu-badge-btn--danger-reverse" mat-flat-button>Có, tôi chắc chắn</button>
    </div>
</div>
