<div class="ictu-deleting-animation">
	<div class="ictu-deleting-animation__inside">
		<h4 class="ictu-deleting-animation__heading">{{heading}}</h4>
		<mat-progress-bar [mode]="mode()" [value]="value()" class="ictu-deleting-animation__progress-bar loader"></mat-progress-bar>
		<b class="ictu-deleting-animation__complete">{{ value() }}%</b>
	</div>
</div>
