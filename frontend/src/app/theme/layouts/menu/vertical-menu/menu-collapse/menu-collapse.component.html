<li [routerLinkActive]="['active']" class="nav-item coded-hasmenu" data-username="able-pro dashboard">
	<a (click)="navCollapse($event)" [routerLinkActive]="['active']" class="nav-link">
		@if (item.icon) {
			<span class="coded-micon">
				<svg class="pc-icon"><use [attr.href]="'fonts/custom-icon.svg'+ item.icon"></use></svg>
			</span>
		}
		<span class="coded-mtext">{{ item.title }} </span>
	</a>
	<ul [ngClass]="item.classes!" [routerLinkActive]="['active']" class="coded-submenu">
		@for (item of item.children; track item) {
			@if (item.type === 'collapse') {
				<app-menu-collapse [item]="item"></app-menu-collapse>
			}
			@if (item.type === 'item') {
				<app-menu-item [item]="item"></app-menu-item>
			}
		}
	</ul>
</li>
